<!DOCTYPE html>
<html lang="{{- .Site.Language.Lang -}}">
<head>
    {{- partial "head.html" . -}}
</head>
<body>
    <div class="w-full min-h-screen flex justify-center">
        <main class="flex flex-col items-center w-10/12 sm:w-3/5 md:w-[38%] min-h-screen">
            {{- partial "header.html" . -}}
            <section class="w-full h-full flex-grow px-2 py-5">
                {{- block "main" . }}
                {{- end }}
            </section>
            {{- partial "footer.html" . -}}
        </main>   
    </div>      
</body>
</html>
